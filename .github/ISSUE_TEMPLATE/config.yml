# Issue template chooser configuration.
# https://docs.github.com/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository#configuring-the-template-chooser
blank_issues_enabled: false
contact_links:
  - name: Security report (private)
    url: https://github.com/mmohamedkhaled/cybersecurity-101/security/advisories/new
    about: |
      Found a correctness bug, crash, or logic error that is security-sensitive?
      Report it privately via a Security Advisory instead of a public issue
      (see SECURITY.md).
  - name: Question or discussion
    url: https://github.com/mmohamedkhaled/cybersecurity-101/discussions
    about: Ask a learning question or start a discussion.
