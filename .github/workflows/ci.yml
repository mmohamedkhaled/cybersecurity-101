# Continuous integration for Cybersecurity 101.
#
# Two jobs:
#   check  -> ruff (lint) + mypy (type-check) on a single Python version.
#   test   -> runs every module's built-in run_tests() suite across the
#             supported Python range (3.10, 3.11, 3.12) with the optional
#             dependencies installed, so the whole suite is exercised.
#
# The badge in README.md points at this file's workflow name.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tooling (ruff, mypy)
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type-check
        run: mypy *.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install optional dependencies
        run: pip install -r requirements.txt

      # `make test` runs each *.py and exits non-zero if any suite fails.
      - name: Run every module's built-in test suite
        run: make test
